<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카테고리 관리 UI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f7f6;
    --bg-tertiary: #f0efec;
    --bg-info: #e6f1fb;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-info: #185FA5;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --border-info: rgba(24,95,165,0.35);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #252523;
      --bg-tertiary: #2c2c2a;
      --bg-info: #0c2a45;
      --text-primary: #e8e6de;
      --text-secondary: #a8a69e;
      --text-tertiary: #686660;
      --text-info: #5fa3e0;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);
      --border-info: rgba(95,163,224,0.35);
    }
  }

  body {
    font-family: var(--font);
    font-size: 14px;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }

  .layout {
    display: flex;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    width: 100%;
    max-width: 840px;
    min-height: 540px;
    background: var(--bg-primary);
    box-shadow: 0 2px 20px rgba(0,0,0,0.07);
  }

  /* LEFT */
  .left {
    width: 280px;
    min-width: 280px;
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .left-header {
    padding: 14px 16px 10px;
    border-bottom: 0.5px solid var(--border);
  }

  .left-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .btn-add-root {
    font-size: 12px;
    color: var(--text-info);
    background: none;
    border: 0.5px solid var(--border-info);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: var(--font);
  }

  .btn-add-root:hover { background: var(--bg-info); }

  .search-wrap { position: relative; }

  .search-wrap input {
    width: 100%;
    padding: 7px 10px 7px 30px;
    font-size: 13px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    color: var(--text-primary);
    outline: none;
    font-family: var(--font);
  }

  .search-wrap input:focus { border-color: var(--border-md); }

  .search-icon {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--text-tertiary);
    pointer-events: none;
  }

  .tree-body { flex: 1; overflow-y: auto; padding: 8px 0; }

  .tree-node { user-select: none; }

  .node-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 6px;
    margin: 1px 6px;
  }

  .node-row:hover { background: var(--bg-secondary); }
  .node-row.selected { background: var(--bg-info); }
  .node-row.selected .node-name { color: var(--text-info); font-weight: 500; }

  .toggle-btn {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text-tertiary);
    font-size: 10px;
    border-radius: 3px;
  }

  .toggle-placeholder { width: 16px; flex-shrink: 0; }

  .depth-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 5px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .d1 { background: #e6f1fb; color: #185FA5; }
  .d2 { background: #e1f5ee; color: #0F6E56; }
  .d3 { background: #faeeda; color: #854F0B; }

  @media (prefers-color-scheme: dark) {
    .d1 { background: #0c2a45; color: #5fa3e0; }
    .d2 { background: #04342c; color: #5dcaa5; }
    .d3 { background: #412402; color: #ef9f27; }
  }

  .node-name {
    font-size: 13px;
    color: var(--text-primary);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .node-count { font-size: 11px; color: var(--text-tertiary); }

  .node-actions { display: none; gap: 2px; }
  .node-row:hover .node-actions,
  .node-row.selected .node-actions { display: flex; }

  .act-btn {
    font-size: 11px;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 4px;
    font-family: var(--font);
  }

  .act-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }

  .children { padding-left: 16px; }

  /* RIGHT */
  .right { flex: 1; display: flex; flex-direction: column; }

  .right-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-tertiary);
  }

  .right-empty svg { opacity: .3; }
  .right-empty span { font-size: 13px; }

  .edit-panel { flex: 1; display: flex; flex-direction: column; }

  .edit-header {
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
  }

  .breadcrumb { font-size: 12px; color: var(--text-tertiary); flex: 1; }
  .breadcrumb .sep { margin: 0 4px; }

  .edit-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex: 1;
  }

  .field-group { display: flex; flex-direction: column; gap: 6px; }

  .field-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .field-input {
    padding: 8px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-primary);
    outline: none;
    font-family: var(--font);
    width: 100%;
  }

  .field-input:focus { border-color: var(--border-md); }

  .slug-wrap { position: relative; }
  .slug-prefix {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--text-tertiary);
    pointer-events: none;
  }

  .slug-input {
    padding-left: 22px !important;
    font-family: var(--font-mono) !important;
    font-size: 13px !important;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
  }

  .toggle-label { font-size: 13px; color: var(--text-primary); }
  .toggle-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

  .pill-toggle {
    width: 36px;
    height: 20px;
    background: var(--border-md);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background .2s;
    flex-shrink: 0;
  }

  .pill-toggle.on { background: #185FA5; }

  .pill-toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
  }

  .pill-toggle.on::after { transform: translateX(16px); }

  .depth-info {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
  }

  .depth-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .depth-info-text { font-size: 12px; color: var(--text-secondary); }

  .add-child-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 0.5px dashed var(--border-md);
    border-radius: var(--radius-md);
    color: var(--text-tertiary);
    font-size: 13px;
    padding: 9px 14px;
    cursor: pointer;
    width: 100%;
    font-family: var(--font);
  }

  .add-child-btn:hover {
    background: var(--bg-secondary);
    color: var(--text-secondary);
  }

  .limit-note {
    font-size: 12px;
    color: var(--text-tertiary);
    padding: 4px 0;
  }

  .edit-footer {
    padding: 14px 20px;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-del {
    background: none;
    border: 0.5px solid rgba(200,50,50,0.4);
    color: #c83232;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: var(--font);
    margin-right: auto;
  }

  .btn-del:hover { background: rgba(200,50,50,0.07); }

  .btn-cancel {
    background: none;
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: var(--font);
  }

  .btn-save {
    background: #185FA5;
    border: none;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 18px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: var(--font);
  }

  .btn-save:hover { opacity: .9; }

  /* scrollbar */
  .tree-body::-webkit-scrollbar { width: 4px; }
  .tree-body::-webkit-scrollbar-track { background: transparent; }
  .tree-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<h1>카테고리 관리</h1>

<div class="layout">
  <div class="left">
    <div class="left-header">
      <div class="left-header-top">
        <span class="panel-title">카테고리 구조</span>
        <button class="btn-add-root" onclick="addRoot()">+ 1뎁스 추가</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="카테고리 검색..." oninput="filterTree(this.value)" id="search-input">
      </div>
    </div>
    <div class="tree-body" id="tree-body"></div>
  </div>

  <div class="right" id="right-panel">
    <div class="right-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M9 12h6M12 9v6"/>
      </svg>
      <span>카테고리를 선택하거나 추가하세요</span>
    </div>
  </div>
</div>

<script>
const depthColors = ['#185FA5','#0F6E56','#854F0B'];
const depthNames = ['1뎁스','2뎁스','3뎁스'];

let data = [
  { id:1, name:'콘텐츠', slug:'content', visible:true, children:[
    { id:2, name:'뉴스', slug:'content/news', visible:true, children:[
      { id:3, name:'사회', slug:'content/news/society', visible:true, children:[] },
      { id:4, name:'정치', slug:'content/news/politics', visible:true, children:[] },
    ]},
    { id:5, name:'기획', slug:'content/feature', visible:false, children:[] },
  ]},
  { id:6, name:'제품', slug:'product', visible:true, children:[
    { id:7, name:'가전', slug:'product/appliance', visible:true, children:[
      { id:8, name:'주방', slug:'product/appliance/kitchen', visible:true, children:[] },
    ]},
  ]},
  { id:9, name:'이벤트', slug:'event', visible:true, children:[] },
];

let nextId = 20;
let selectedId = null;
let collapsed = new Set();

function findNode(nodes, id) {
  for(let n of nodes) {
    if(n.id === id) return n;
    const f = findNode(n.children, id);
    if(f) return f;
  }
  return null;
}

function findParent(nodes, id, parent=null) {
  for(let n of nodes) {
    if(n.id === id) return parent;
    const p = findParent(n.children, id, n);
    if(p !== undefined) return p;
  }
  return undefined;
}

function getDepth(nodes, id, d=0) {
  for(let n of nodes) {
    if(n.id === id) return d;
    const f = getDepth(n.children, id, d+1);
    if(f !== -1) return f;
  }
  return -1;
}

function getBreadcrumb(nodes, id, trail=[]) {
  for(let n of nodes) {
    if(n.id === id) return [...trail, n.name];
    const f = getBreadcrumb(n.children, id, [...trail, n.name]);
    if(f) return f;
  }
  return null;
}

function renderTree() {
  const q = document.getElementById('search-input').value.toLowerCase();
  document.getElementById('tree-body').innerHTML = renderNodes(data, 0, q);
}

function renderNodes(nodes, depth, q) {
  return nodes.map(n => {
    const match = !q || n.name.toLowerCase().includes(q);
    const childHtml = renderNodes(n.children, depth+1, q);
    const childMatch = childHtml.includes('node-row');
    if(q && !match && !childMatch) return '';

    const isOpen = !collapsed.has(n.id);
    const hasChildren = n.children.length > 0;
    const badge = `<span class="depth-badge d${depth+1}">${depthNames[depth]}</span>`;
    const toggle = hasChildren
      ? `<span class="toggle-btn" onclick="event.stopPropagation();toggleCollapse(${n.id})">${isOpen?'▾':'▸'}</span>`
      : `<span class="toggle-placeholder"></span>`;
    const hiddenLabel = !n.visible ? ` <span style="font-size:10px;color:var(--text-tertiary)">(숨김)</span>` : '';
    const actions = [
      depth < 2 ? `<button class="act-btn" onclick="event.stopPropagation();addChild(${n.id})">+ 하위</button>` : '',
      `<button class="act-btn" onclick="event.stopPropagation();deleteNode(${n.id})">✕</button>`
    ].join('');

    return `
      <div class="tree-node">
        <div class="node-row${selectedId===n.id?' selected':''}" onclick="selectNode(${n.id})">
          ${toggle}${badge}
          <span class="node-name" style="opacity:${n.visible?1:0.4}">${n.name}${hiddenLabel}</span>
          <span class="node-count">${n.children.length > 0 ? n.children.length : ''}</span>
          <span class="node-actions">${actions}</span>
        </div>
        ${isOpen || q ? `<div class="children">${childHtml}</div>` : ''}
      </div>`;
  }).join('');
}

function toggleCollapse(id) {
  collapsed.has(id) ? collapsed.delete(id) : collapsed.add(id);
  renderTree();
}

function filterTree(q) { renderTree(); }

function selectNode(id) {
  selectedId = id;
  renderTree();
  showEdit(id);
}

function showEdit(id) {
  const node = findNode(data, id);
  const depth = getDepth(data, id);
  const crumbs = getBreadcrumb(data, id);
  const parent = findParent(data, id);

  const crumbHtml = crumbs.map((c,i) =>
    i < crumbs.length-1
      ? `<span>${c}</span><span class="sep">/</span>`
      : `<span style="color:var(--text-primary);font-weight:500">${c}</span>`
  ).join('');

  const canAddChild = depth < 2;
  const depthColor = depthColors[depth];

  document.getElementById('right-panel').innerHTML = `
    <div class="edit-panel">
      <div class="edit-header">
        <div class="breadcrumb">${crumbHtml}</div>
      </div>
      <div class="edit-body">
        <div class="depth-info">
          <div class="depth-dot" style="background:${depthColor}"></div>
          <span class="depth-info-text">${depthNames[depth]} 카테고리${parent ? ' · 상위: ' + parent.name : ''}</span>
        </div>

        <div class="field-group">
          <span class="field-label">카테고리명 *</span>
          <input class="field-input" id="edit-name" value="${node.name}" placeholder="카테고리 이름 입력">
        </div>

        <div class="field-group">
          <span class="field-label">슬러그 (URL 경로)</span>
          <div class="slug-wrap">
            <span class="slug-prefix">/</span>
            <input class="field-input slug-input" id="edit-slug" value="${node.slug}" placeholder="url-slug">
          </div>
        </div>

        <div class="toggle-row">
          <div>
            <div class="toggle-label">노출 상태</div>
            <div class="toggle-sub">비활성화 시 메뉴에 표시되지 않습니다</div>
          </div>
          <div class="pill-toggle${node.visible?' on':''}" id="vis-toggle" onclick="this.classList.toggle('on')"></div>
        </div>

        ${canAddChild
          ? `<button class="add-child-btn" onclick="addChild(${id})">+ ${depthNames[depth+1]} 하위 카테고리 추가</button>`
          : `<p class="limit-note">3뎁스는 최하위 — 하위 카테고리를 추가할 수 없습니다</p>`
        }
      </div>
      <div class="edit-footer">
        <button class="btn-del" onclick="deleteNode(${id})">삭제</button>
        <button class="btn-cancel" onclick="cancelEdit()">취소</button>
        <button class="btn-save" onclick="saveNode(${id})">저장</button>
      </div>
    </div>`;
}

function saveNode(id) {
  const node = findNode(data, id);
  node.name = document.getElementById('edit-name').value || node.name;
  node.slug = document.getElementById('edit-slug').value || node.slug;
  node.visible = document.getElementById('vis-toggle').classList.contains('on');
  renderTree();
  showEdit(id);
}

function cancelEdit() {
  selectedId = null;
  renderTree();
  document.getElementById('right-panel').innerHTML = `
    <div class="right-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M9 12h6M12 9v6"/>
      </svg>
      <span>카테고리를 선택하거나 추가하세요</span>
    </div>`;
}

function addRoot() {
  const node = { id: nextId++, name: '새 카테고리', slug: 'new-category', visible: true, children: [] };
  data.push(node);
  selectedId = node.id;
  renderTree();
  showEdit(node.id);
}

function addChild(parentId) {
  const parent = findNode(data, parentId);
  const depth = getDepth(data, parentId);
  if(depth >= 2) return;
  const node = { id: nextId++, name: '새 하위 카테고리', slug: parent.slug + '/new', visible: true, children: [] };
  parent.children.push(node);
  collapsed.delete(parentId);
  selectedId = node.id;
  renderTree();
  showEdit(node.id);
}

function deleteNode(id) {
  function removeFrom(nodes) {
    const idx = nodes.findIndex(n => n.id === id);
    if(idx !== -1) { nodes.splice(idx, 1); return true; }
    return nodes.some(n => removeFrom(n.children));
  }
  removeFrom(data);
  if(selectedId === id) cancelEdit();
  else renderTree();
}

renderTree();
</script>
</body>
</html>
